name: 편집몬 재택 공고 알림

on:
  schedule:
    - cron: "*/30 * * * *"   # 30분마다 (UTC 기준 간격, 실행은 수 분 지연될 수 있음)
  workflow_dispatch: {}        # Actions 탭에서 수동 실행 버튼

permissions:
  contents: write              # state.json(마지막 확인 글번호) 커밋용

concurrency:
  group: editmon-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 의존성 설치 (브라우저 포함)
        run: |
          pip install beautifulsoup4 playwright
          python -m playwright install --with-deps chromium

      - name: 새 공고 확인 및 알림
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: "8628024271"   # 받는 사람(이 값은 비밀이 아님)
          ONLY_REMOTE: "0"                 # 1=재택만, 0=모든 새 공고
          USE_BROWSER: "1"                 # 편집몬 차단 우회용 브라우저 접속
        run: python monitor.py

      - name: 상태 저장(중복 발송 방지)
        run: |
          if [[ -n "$(git status --porcelain state.json)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "update watermark [skip ci]"
            git push
          else
            echo "변경 없음."
          fi
